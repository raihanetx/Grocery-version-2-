# Use Firebase Auth as a third-party auth provider alongside Supabase Auth.
[auth.third_party.firebase]
enabled = false
# project_id = "my-firebase-project"

# Use Auth0 as a third-party auth provider alongside Supabase Auth.
[auth.third_party.auth0]
enabled = false
# tenant = "my-auth0-tenant"
# tenant_region = "us"

# Use AWS Cognito (Amplify) as a third-party auth provider alongside Supabase Auth.
[auth.third_party.aws_cognito]
enabled = false
# user_pool_id = "my-user-pool-id"
# user_pool_region = "us-east-1"

# Use Clerk as a third-party auth provider alongside Supabase Auth.
[auth.third_party.clerk]
enabled = false
# Obtain the keys from https://clerk.com/setup/supabase
# domain = "example.clerk.accounts.dev"
# secret_key = "sk_test_..."

[edge_runtime]
enabled = true
# Configure one of the supported request policies: `per_worker` or `oneshot`.
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = true
port = 54327
# Configure one of the supported backends: `postgres`, `bigquery`.
backend = "postgres"

# Experimental features may be deprecated any time. Here, you may opt-in to experimental features
# before they are launched to production.
[experimental]
# Configures Postgres storage engine to use the oxidized version which is written in Rust.
# It is currently feature complete and ready for testing.
orioledb_version = ""
# Configures S3 access credentials for the storage backend. This is required for hosting large files.
# [experimental.s3]
# host =
# region =
# bucket =
# access_key =
# secret_key =
